# Database settings
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:nacf9db}
spring.datasource.username=${PG_USER:cf9final}
spring.datasource.password=${PG_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=validate

# Schema - tell Hibernate to use the specified schema
spring.jpa.properties.hibernate.default_schema=nacf9

# Flyway - tell Flyway to use the specified schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=nacf9

# make sure to use JOIN FETCH or EntityGraph
spring.jpa.open-in-view=false

app.security.secret-key=5ce965d378ec88ea09ba8fvc511ef23645f04dv8e60b9134b98723a53c275bbc5
app.security.jwt-expiration=10800000

